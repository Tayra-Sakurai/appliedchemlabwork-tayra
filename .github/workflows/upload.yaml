name: Upload project

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Update PIP
        run: python -m pip install --upgrade pip

      - run: pip install -r requirements.txt

      - run: py -m build

      - name: Upload the artifacts
        uses: actions/upload-artifact@v7
        with:
          path: dist/*

  generate_document:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Update pip
        run: python -m pip install --upgrade pip

      - name: Install Sphinx
        run: pip install -r requirements.txt

      - run: sphinx-build -b latex docs_src/source builds

      - uses: actions/upload-artifact@v7
        with:
          path: builds/

name: Upload project

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: pwsh

jobs:
  build:
    environment:
      name: pypi
      url: https://pypi.org/p/appliedchemlabwork-tayra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Update pip
        run: python -m pip install --upgrade pip

      - name: Install Sphinx
        run: pip install -r requirements.txt

      - run: sphinx-build -b html docs_src/source builds

      - uses: actions/upload-artifact@v7
        with:
          path: builds/

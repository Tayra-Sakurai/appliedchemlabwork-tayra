name: Upload project

on:
  push:
    branches:
      - main
    paths:
      - src/**.py
      - pyproject.toml
      - .github/workflows/upload.yaml
  workflow_dispatch:
  pull_request:
    types: ['assigned']

jobs:
  build:
    environment:
      name: pypi
      url: https://pypi.org/p/appliedchemlabwork-tayra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Check out the Repository
        uses: actions/checkout@v7

      - name: Configure Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build package.
        run: python -m pip install --upgrade build

      - name: Build Python
        run: python -m build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        
